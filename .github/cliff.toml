[changelog]
header = """# Aenderungsprotokoll\n
Alle wesentlichen Aenderungen an diesem Projekt.\n"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Hinzugefuegt" },
    { message = "^fix", group = "Behoben" },
    { message = "^docs", group = "Dokumentation" },
    { message = "^refactor", group = "Geaendert" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Tests" },
    { message = "^chore", group = "Sonstiges" },
    { body = ".*security", group = "Sicherheit" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
